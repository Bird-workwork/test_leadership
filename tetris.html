<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tetris</title>
<style>
  :root {
    --bg: #111318;
    --panel: #1b1e27;
    --border: #2c2f3a;
    --text: #eee;
    --accent: #EE4D2D;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .app {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .board-wrap {
    position: relative;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px;
  }
  canvas {
    display: block;
    background: #0a0b10;
    border-radius: 4px;
  }
  .overlay {
    position: absolute;
    inset: 10px;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(10, 11, 16, 0.85);
    border-radius: 4px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .side {
    width: 180px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .panel {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .panel h3 {
    margin: 0 0 8px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #999;
  }
  .stat {
    display: flex;
    justify-content: space-between;
    font-size: 15px;
    margin: 4px 0;
  }
  .stat b { color: var(--accent); }
  #nextCanvas {
    display: block;
    margin: 0 auto;
    background: #0a0b10;
    border-radius: 4px;
  }
  .keys {
    font-size: 12px;
    color: #999;
    line-height: 1.7;
  }
  .keys b { color: var(--text); }
  button {
    width: 100%;
    padding: 8px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #D73211; }
</style>
</head>
<body>
  <div class="app">
    <div class="board-wrap">
      <canvas id="board" width="240" height="480"></canvas>
      <div class="overlay" id="overlay"></div>
    </div>
    <div class="side">
      <div class="panel">
        <h3>Next</h3>
        <canvas id="nextCanvas" width="96" height="96"></canvas>
      </div>
      <div class="panel">
        <div class="stat">Score <b id="score">0</b></div>
        <div class="stat">Lines <b id="lines">0</b></div>
        <div class="stat">Level <b id="level">1</b></div>
      </div>
      <div class="panel">
        <button id="pauseBtn">Pause</button>
      </div>
      <div class="panel keys">
        <div><b>&larr; &rarr;</b> Move</div>
        <div><b>&uarr;</b> Rotate</div>
        <div><b>&darr;</b> Soft drop</div>
        <div><b>Space</b> Hard drop</div>
        <div><b>P</b> Pause</div>
      </div>
    </div>
  </div>

<script>
(() => {
  const COLS = 10, ROWS = 20, CELL = 24;
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('nextCanvas');
  const nextCtx = nextCanvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreEl = document.getElementById('score');
  const linesEl = document.getElementById('lines');
  const levelEl = document.getElementById('level');
  const pauseBtn = document.getElementById('pauseBtn');

  const COLORS = {
    I: '#31C7EF', O: '#F7D308', T: '#AD4D9C',
    S: '#42B642', Z: '#EF2029', J: '#5A65AD', L: '#EF8B22'
  };

  const SHAPES = {
    I: [[0,0],[1,0],[2,0],[3,0]],
    O: [[0,0],[1,0],[0,1],[1,1]],
    T: [[0,0],[1,0],[2,0],[1,1]],
    S: [[1,0],[2,0],[0,1],[1,1]],
    Z: [[0,0],[1,0],[1,1],[2,1]],
    J: [[0,0],[0,1],[1,1],[2,1]],
    L: [[2,0],[0,1],[1,1],[2,1]],
  };

  const PIECE_KEYS = Object.keys(SHAPES);

  function rotateCells(cells) {
    // rotate around a 4x4 box (clockwise)
    return cells.map(([x, y]) => [3 - y, x]);
  }

  function normalize(cells) {
    const minX = Math.min(...cells.map(c => c[0]));
    const minY = Math.min(...cells.map(c => c[1]));
    return cells.map(([x, y]) => [x - minX, y - minY]);
  }

  function randomPieceKey() {
    return PIECE_KEYS[Math.floor(Math.random() * PIECE_KEYS.length)];
  }

  function makePiece(key) {
    return { key, cells: SHAPES[key].map(c => c.slice()), x: 3, y: -1 };
  }

  let grid, current, next, score, lines, level, dropInterval, dropTimer;
  let gameOver, paused, rafId, lastTime;

  function init() {
    grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    score = 0; lines = 0; level = 1;
    dropInterval = 800;
    dropTimer = 0;
    gameOver = false; paused = false;
    current = makePiece(randomPieceKey());
    next = makePiece(randomPieceKey());
    updateStats();
    overlay.classList.remove('show');
    pauseBtn.textContent = 'Pause';
    lastTime = null;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function updateStats() {
    scoreEl.textContent = score;
    linesEl.textContent = lines;
    levelEl.textContent = level;
  }

  function collides(cells, ox, oy) {
    return cells.some(([cx, cy]) => {
      const x = cx + ox, y = cy + oy;
      if (x < 0 || x >= COLS || y >= ROWS) return true;
      if (y < 0) return false;
      return grid[y][x] !== null;
    });
  }

  function lockPiece() {
    current.cells.forEach(([cx, cy]) => {
      const x = current.x + cx, y = current.y + cy;
      if (y >= 0) grid[y][x] = current.key;
    });
    clearLines();
    current = next;
    next = makePiece(randomPieceKey());
    if (collides(current.cells, current.x, current.y)) {
      gameOver = true;
      overlay.textContent = 'Game Over — press R to restart';
      overlay.classList.add('show');
    }
  }

  function clearLines() {
    let cleared = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
      if (grid[y].every(c => c !== null)) {
        grid.splice(y, 1);
        grid.unshift(Array(COLS).fill(null));
        cleared++;
        y++;
      }
    }
    if (cleared > 0) {
      const points = [0, 100, 300, 500, 800][cleared] * level;
      score += points;
      lines += cleared;
      const newLevel = Math.floor(lines / 10) + 1;
      if (newLevel !== level) {
        level = newLevel;
        dropInterval = Math.max(100, 800 - (level - 1) * 70);
      }
      updateStats();
    }
  }

  function move(dx) {
    if (!collides(current.cells, current.x + dx, current.y)) {
      current.x += dx;
    }
  }

  function softDrop() {
    if (!collides(current.cells, current.x, current.y + 1)) {
      current.y += 1;
      score += 1;
      updateStats();
      return true;
    }
    lockPiece();
    return false;
  }

  function hardDrop() {
    let moved = 0;
    while (!collides(current.cells, current.x, current.y + 1)) {
      current.y += 1;
      moved++;
    }
    score += moved * 2;
    updateStats();
    lockPiece();
  }

  function rotate() {
    const rotated = normalize(rotateCells(current.cells));
    const kicks = [0, -1, 1, -2, 2];
    for (const k of kicks) {
      if (!collides(rotated, current.x + k, current.y)) {
        current.cells = rotated;
        current.x += k;
        return;
      }
    }
  }

  function drawCell(context, x, y, color, cellSize) {
    context.fillStyle = color;
    context.fillRect(x * cellSize, y * cellSize, cellSize - 1, cellSize - 1);
    context.fillStyle = 'rgba(255,255,255,0.15)';
    context.fillRect(x * cellSize, y * cellSize, cellSize - 1, 3);
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x]) drawCell(ctx, x, y, COLORS[grid[y][x]], CELL);
      }
    }
    // ghost piece
    let ghostY = current.y;
    while (!collides(current.cells, current.x, ghostY + 1)) ghostY++;
    ctx.globalAlpha = 0.25;
    current.cells.forEach(([cx, cy]) => {
      const y = ghostY + cy;
      if (y >= 0) drawCell(ctx, current.x + cx, y, COLORS[current.key], CELL);
    });
    ctx.globalAlpha = 1;

    current.cells.forEach(([cx, cy]) => {
      const y = current.y + cy;
      if (y >= 0) drawCell(ctx, current.x + cx, y, COLORS[current.key], CELL);
    });

    nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    const cellSize = 20;
    next.cells.forEach(([cx, cy]) => drawCell(nextCtx, cx + 1, cy + 1, COLORS[next.key], cellSize));
  }

  function loop(time) {
    if (lastTime === null) lastTime = time;
    const dt = time - lastTime;
    lastTime = time;
    if (!gameOver && !paused) {
      dropTimer += dt;
      if (dropTimer >= dropInterval) {
        dropTimer = 0;
        softDrop();
      }
      draw();
    }
    rafId = requestAnimationFrame(loop);
  }

  function togglePause() {
    if (gameOver) return;
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    overlay.textContent = 'Paused';
    overlay.classList.toggle('show', paused);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') { init(); return; }
    if (gameOver || paused) {
      if (e.key === 'p' || e.key === 'P') togglePause();
      return;
    }
    switch (e.key) {
      case 'ArrowLeft': move(-1); break;
      case 'ArrowRight': move(1); break;
      case 'ArrowDown': softDrop(); break;
      case 'ArrowUp': rotate(); break;
      case ' ': e.preventDefault(); hardDrop(); break;
      case 'p': case 'P': togglePause(); break;
    }
  });

  pauseBtn.addEventListener('click', togglePause);

  init();
})();
</script>
</body>
</html>
